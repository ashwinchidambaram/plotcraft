[project]
name = "plotcraft"
version = "0.1.0"
description = "AI-friendly diagram engine — text-driven, grid-snapped SVG generation for LLM agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/plotcraft"]

[tool.pytest.ini_options]
testpaths = ["tests"]
