[project]
name = "plotcraft"
version = "0.2.0"
description = "AI-friendly diagram engine — freeform Scene API with D2 rendering for LLM agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cairosvg>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/plotcraft"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = ["visual: visual regression tests (require playwright)"]

[dependency-groups]
dev = [
    "playwright>=1.58.0",
    "pytest>=9.0",
]
